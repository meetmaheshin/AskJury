[phases.setup]
nixPkgs = ['nodejs_20']

[phases.install]
cmds = ['npm ci']

# IMPORTANT: use `db push` WITHOUT --accept-data-loss. Plain db push refuses
# data-losing changes (it aborts) instead of wiping the database.
[phases.build]
cmds = ['npx prisma generate', 'npx prisma db push']

[start]
cmd = 'npm start'